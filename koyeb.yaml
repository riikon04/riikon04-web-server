name: riikon04-api
services:
  - name: api
    type: web
    runtime: docker
    ports:
      - port: 3000
        protocol: http
    env:
      - name: DISCORD_TOKEN
        value: "${DISCORD_TOKEN}"
      - name: GUILD_ID
        value: "${GUILD_ID}"
      - name: PORT
        value: "3000"
    routes:
      - path: /
        port: 3000