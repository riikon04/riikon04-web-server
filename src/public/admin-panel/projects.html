<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riikon04 Admin - Quản lý dự án</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
        <div class="position-sticky pt-3">
          <div class="d-flex align-items-center justify-content-center mb-4">
            <img src="https://riikonteam.io.vn/logo.png" alt="Riikon04 Logo" width="40" class="me-2">
            <h5 class="text-white mb-0">Riikon04 Admin</h5>
          </div>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link " href="index.html">
                <i class="bi bi-house-door me-2"></i>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="projects.html">
                <i class="bi bi-kanban me-2"></i>
                Quản lý dự án
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="users.html">
                <i class="bi bi-people me-2"></i>
                Quản lý người dùng
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="messages.html">
                <i class="bi bi-chat-dots me-2"></i>
                Gửi tin nhắn Discord
              </a>
            </li>
            <li class="nav-item mt-5">
              <a class="nav-link text-danger" href="#" id="logout-btn">
                <i class="bi bi-box-arrow-right me-2"></i>
                Đăng xuất
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div
          class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Quản lý dự án</h1>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProjectModal">
            <i class="bi bi-plus-circle me-1"></i> Thêm dự án mới
          </button>
        </div>

        <!-- Projects List -->
        <div class="card shadow mb-4">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered" id="projectsTable" width="100%" cellspacing="0">
                <thead>
                  <tr>
                    <th width="5%">#</th>
                    <th width="20%">Tên dự án</th>
                    <th width="30%">Mô tả</th>
                    <th width="15%">Ngôn ngữ</th>
                    <th width="15%">Ngày triển khai</th>
                    <th width="15%">Thao tác</th>
                  </tr>
                </thead>
                <tbody id="projects-list">
                  <tr>
                    <td colspan="6" class="text-center">Đang tải dữ liệu...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add Project Modal -->
  <div class="modal fade" id="addProjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Thêm dự án mới</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addProjectForm">
            <div class="mb-3">
              <label for="projectName" class="form-label">Tên dự án</label>
              <input type="text" class="form-control" id="projectName" required>
            </div>
            <div class="mb-3">
              <label for="projectDescription" class="form-label">Mô tả</label>
              <textarea class="form-control" id="projectDescription" rows="3" required></textarea>
            </div>
            <div class="mb-3">
              <label for="projectGithub" class="form-label">Đường dẫn GitHub</label>
              <input type="url" class="form-control" id="projectGithub" required>
            </div>
            <div class="mb-3">
              <label for="projectLanguages" class="form-label">Ngôn ngữ lập trình (phân cách bằng dấu phẩy)</label>
              <input type="text" class="form-control" id="projectLanguages" placeholder="JavaScript, TypeScript, React">
            </div>
            <div class="mb-3">
              <label for="projectMembers" class="form-label">ID thành viên Discord (phân cách bằng dấu phẩy)</label>
              <input type="text" class="form-control" id="projectMembers"
                placeholder="123456789012345678, 234567890123456789">
            </div>
            <div class="mb-3">
              <label for="projectDeployedAt" class="form-label">Ngày triển khai</label>
              <input type="date" class="form-control" id="projectDeployedAt">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          <button type="button" class="btn btn-primary" id="saveProjectBtn">Lưu dự án</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Project Modal (tương tự Add Modal) -->
  <div class="modal fade" id="editProjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Chỉnh sửa dự án</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="editProjectForm">
            <input type="hidden" id="editProjectId">
            <div class="mb-3">
              <label for="editProjectName" class="form-label">Tên dự án</label>
              <input type="text" class="form-control" id="editProjectName" required>
            </div>
            <div class="mb-3">
              <label for="editProjectDescription" class="form-label">Mô tả</label>
              <textarea class="form-control" id="editProjectDescription" rows="3" required></textarea>
            </div>
            <div class="mb-3">
              <label for="editProjectGithub" class="form-label">Đường dẫn GitHub</label>
              <input type="url" class="form-control" id="editProjectGithub" required>
            </div>
            <div class="mb-3">
              <label for="editProjectLanguages" class="form-label">Ngôn ngữ lập trình (phân cách bằng dấu phẩy)</label>
              <input type="text" class="form-control" id="editProjectLanguages" placeholder="JavaScript, TypeScript, React">
            </div>
            <div class="mb-3">
              <label for="editProjectMembers" class="form-label">ID thành viên Discord (phân cách bằng dấu phẩy)</label>
              <input type="text" class="form-control" id="editProjectMembers"
          placeholder="123456789012345678, 234567890123456789">
            </div>
            <div class="mb-3">
              <label for="editProjectDeployedAt" class="form-label">Ngày triển khai</label>
              <input type="date" class="form-control" id="editProjectDeployedAt">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          <button type="button" class="btn btn-primary" id="updateProjectBtn">Cập nhật dự án</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deleteProjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Xác nhận xóa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          Bạn có chắc chắn muốn xóa dự án "<span id="deleteProjectName"></span>"?
          <input type="hidden" id="deleteProjectId">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/projects.js"></script>
</body>

</html>
