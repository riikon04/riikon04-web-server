<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riikon04 Admin - Gửi tin nhắn Discord</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
        <div class="position-sticky pt-3">
          <div class="d-flex align-items-center justify-content-center mb-4">
            <img src="https://riikonteam.io.vn/logo.png" alt="Riikon04 Logo" width="40" class="me-2">
            <h5 class="text-white mb-0">Riikon04 Admin</h5>
          </div>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" href="index.html">
                <i class="bi bi-house-door me-2"></i>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="projects.html">
                <i class="bi bi-kanban me-2"></i>
                Quản lý dự án
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="users.html">
                <i class="bi bi-people me-2"></i>
                Quản lý người dùng
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="messages.html">
                <i class="bi bi-chat-dots me-2"></i>
                Gửi tin nhắn Discord
              </a>
            </li>
            <li class="nav-item mt-5">
              <a class="nav-link text-danger" href="#" id="logout-btn">
                <i class="bi bi-box-arrow-right me-2"></i>
                Đăng xuất
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Gửi tin nhắn Discord</h1>
        </div>

        <!-- Message Form -->
        <div class="card shadow mb-4">
          <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold">Soạn tin nhắn</h6>
          </div>
          <div class="card-body">
            <form id="messageForm">
              <div class="mb-3">
                <label for="channelSelect" class="form-label">Chọn kênh</label>
                <select class="form-select" id="channelSelect" required>
                  <option value="">Đang tải kênh...</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Loại tin nhắn</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="messageType" id="regularMessage" value="regular" checked>
                  <label class="form-check-label" for="regularMessage">
                    Tin nhắn thông thường
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="messageType" id="embedMessage" value="embed">
                  <label class="form-check-label" for="embedMessage">
                    Tin nhắn Embed
                  </label>
                </div>
              </div>

              <!-- Regular Message Content -->
              <div id="regularMessageFields">
                <div class="mb-3">
                  <label for="messageContent" class="form-label">Nội dung tin nhắn</label>
                  <textarea class="form-control" id="messageContent" rows="5" placeholder="Nhập nội dung tin nhắn..."></textarea>
                </div>
              </div>

              <!-- Embed Message Content -->
              <div id="embedMessageFields" style="display:none;">
                <div class="mb-3">
                  <label for="embedTitle" class="form-label">Tiêu đề</label>
                  <input type="text" class="form-control" id="embedTitle" placeholder="Tiêu đề Embed">
                </div>
                
                <div class="mb-3">
                  <label for="embedDescription" class="form-label">Mô tả</label>
                  <textarea class="form-control" id="embedDescription" rows="4" placeholder="Mô tả Embed..."></textarea>
                </div>
                
                <div class="mb-3">
                  <label for="embedColor" class="form-label">Màu sắc</label>
                  <input type="color" class="form-control" id="embedColor" value="#5865F2">
                </div>
                
                <div class="mb-3">
                  <label for="embedImage" class="form-label">URL hình ảnh</label>
                  <input type="url" class="form-control" id="embedImage" placeholder="https://example.com/image.png">
                </div>
                
                <div class="mb-3">
                  <label for="embedThumbnail" class="form-label">URL hình thu nhỏ</label>
                  <input type="url" class="form-control" id="embedThumbnail" placeholder="https://example.com/thumbnail.png">
                </div>
                
                <div class="mb-3">
                  <label for="embedFooter" class="form-label">Chân trang</label>
                  <input type="text" class="form-control" id="embedFooter" placeholder="Văn bản chân trang">
                </div>
                
                <div class="mb-3">
                  <label for="embedFooterIcon" class="form-label">URL icon chân trang</label>
                  <input type="url" class="form-control" id="embedFooterIcon" placeholder="https://example.com/footer-icon.png">
                </div>
                
                <div class="mb-3">
                  <label for="embedAuthor" class="form-label">Tên tác giả</label>
                  <input type="text" class="form-control" id="embedAuthor" placeholder="Tên tác giả">
                </div>
                
                <div class="mb-3">
                  <label for="embedAuthorIcon" class="form-label">URL icon tác giả</label>
                  <input type="url" class="form-control" id="embedAuthorIcon" placeholder="https://example.com/author-icon.png">
                </div>
                
                <div class="mb-3">
                  <label for="embedAuthorUrl" class="form-label">URL tác giả</label>
                  <input type="url" class="form-control" id="embedAuthorUrl" placeholder="https://example.com">
                </div>
                
                <div class="mb-3">
                  <label for="embedUrl" class="form-label">URL tiêu đề</label>
                  <input type="url" class="form-control" id="embedUrl" placeholder="https://example.com">
                </div>
                
                <div class="mb-3">
                  <label for="embedTimestamp" class="form-label">Thêm timestamp</label>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="embedTimestamp">
                    <label class="form-check-label" for="embedTimestamp">
                      Hiển thị thời gian gửi
                    </label>
                  </div>
                </div>
                
                <div class="mb-3">
                  <label class="form-label">Các trường (Fields)</label>
                  <div id="embedFields">
                    <!-- Fields will be added here dynamically -->
                  </div>
                  <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="addFieldBtn">
                    <i class="bi bi-plus-circle me-1"></i> Thêm trường
                  </button>
                </div>
                
                <div class="mb-3">
                  <label for="embedContentText" class="form-label">Nội dung kèm theo (tùy chọn)</label>
                  <textarea class="form-control" id="embedContentText" rows="2" placeholder="Nội dung kèm theo Embed..."></textarea>
                </div>
              </div>

              <!-- Preview Section -->
              <div class="mb-3">
                <label class="form-label">Xem trước</label>
                <div class="border rounded p-3 bg-light" id="messagePreview">
                  <div class="alert alert-info">
                    Chọn loại tin nhắn và nhập nội dung để xem trước.
                  </div>
                </div>
              </div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary" id="sendMessageBtn">
                  <i class="bi bi-send me-1"></i> Gửi tin nhắn
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Message History -->
        <div class="card shadow mb-4">
          <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold">Lịch sử tin nhắn đã gửi</h6>
            <button class="btn btn-sm btn-outline-secondary" id="refreshHistoryBtn">
              <i class="bi bi-arrow-clockwise"></i> Làm mới
            </button>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered" id="messagesTable" width="100%" cellspacing="0">
                <thead>
                  <tr>
                    <th width="20%">Thời gian</th>
                    <th width="20%">Kênh</th>
                    <th width="40%">Nội dung</th>
                    <th width="20%">Loại</th>
                  </tr>
                </thead>
                <tbody id="messages-history">
                  <tr>
                    <td colspan="4" class="text-center">Chưa có tin nhắn nào được gửi</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/messages.js"></script>
</body>

</html>
